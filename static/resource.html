<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>VMリソース選択</title>
<style>
body { font-family: sans-serif; background:#f4f6f8; padding:40px; }
.container { max-width:600px; margin:auto; background:white; padding:30px; border-radius:10px; }
.form-group { margin-bottom:25px; }
label { font-weight:bold; display:block; margin-bottom:10px; }
input[type=range] { width:70%; }
input[type=number] { width:25%; padding:5px; }
.row { display:flex; justify-content:space-between; align-items:center; }
button { width:100%; padding:12px; font-size:16px; }
</style>
</head>
<body>
<div class="container">
<h2>仮想マシン リソース選択</h2>

<form method="GET" action="info.html">
    <!-- CPU -->
    <div class="form-group">
        <label>CPUコア数 (1〜3)</label>
        <div class="row">
            <input type="range" id="cpuRange" min="1" max="3" value="1">
            <input type="number" id="cpuNumber" name="cpu" min="1" max="3" value="1">
        </div>
    </div>

    <!-- メモリ -->
    <div class="form-group">
        <label>メモリ (512〜4096MB)</label>
        <div class="row">
            <input type="range" id="memRange" min="512" max="4096" step="512" value="1024">
            <input type="number" id="memNumber" name="memory" min="512" max="4096" step="512" value="1024">
        </div>
    </div>

    <!-- HDD -->
    <div class="form-group">
        <label>ディスク容量 (1〜64GB)</label>
        <div class="row">
            <input type="range" id="hddRange" min="1" max="64" value="10">
            <input type="number" id="hddNumber" name="hdd" min="1" max="64" value="10">
        </div>
    </div>

    <button type="submit">次へ進む</button>
</form>
</div>

<script>
function sync(range, number){
    range.addEventListener('input', ()=> number.value = range.value);
    number.addEventListener('input', ()=> range.value = number.value);
}
sync(cpuRange, cpuNumber);
sync(memRange, memNumber);
sync(hddRange, hddNumber);
</script>
</body>
</html>
