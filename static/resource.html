<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VM作成 — リソース選択</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Inter',system-ui,sans-serif}
input[type=range]{-webkit-appearance:none;background:transparent;cursor:pointer;width:100%}
input[type=range]::-webkit-slider-runnable-track{height:3px;background:#1e1e1e;border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;margin-top:-5.5px}
input[type=range]::-moz-range-track{height:3px;background:#1e1e1e;border-radius:2px;border:none}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#fff;border:none}
</style>
</head>
<body>
<div id="root"></div>
<script>

var iconPaths = {
  server: "M5 4H4a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h1m6 0h2a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2M5 14H4a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h1m6 0h2a2 2 0 0 0 2-2v-2a2 2 0 0 0-2-2h-2",
  hardDrive: "M22 12H2M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11zM6 16h.01M10 16h.01",
  cpu: "M4 5a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1z M9 9h6v6H9z M9 1v2M15 1v2M9 21v2M15 21v2M1 9h2M1 15h2M21 9h2M21 15h2",
  memoryStick: "M6 19v-1a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1m0 0v-1a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1m0 0v-1a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1M3 10h18M3 5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z",
  logOut: "M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9",
  arrowRight: "M5 12h14M12 5l7 7-7 7",
  arrowLeft: "M19 12H5M12 19l-7-7 7-7",
};

function Icon(props) {
  return h("svg", {
    width: props.size || 16, height: props.size || 16, viewBox: "0 0 24 24",
    fill: "none", stroke: props.color || "#fff", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round",
    style: Object.assign({ flexShrink: 0 }, props.style || {}),
  }, h("path", { d: iconPaths[props.name] }));
}

var h = React.createElement;
var useState = React.useState;

function App() {
  var _cpu = useState(1); var cpu = _cpu[0]; var setCpu = _cpu[1];
  var _mem = useState(1024); var mem = _mem[0]; var setMem = _mem[1];
  var _hdd = useState(10); var hdd = _hdd[0]; var setHdd = _hdd[1];

  var numInputStyle = {
    width: 80, textAlign: "center", fontSize: 13,
    background: "#0a0a0a", color: "#ccc",
    border: "1px solid #111", borderRadius: 4, padding: "8px 10px", outline: "none",
  };

  var sliderRow = function(label, icon, value, set, min, max, step, unit) {
    return h("div", { style: { padding: "28px 32px", border: "1px solid #111" } },
      h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 } },
        h("div", { style: { display: "flex", alignItems: "center", gap: 10 } },
          h(Icon, { name: icon, size: 16, color: "#444" }),
          h("span", { style: { fontSize: 12, color: "#444", textTransform: "uppercase", letterSpacing: "0.08em" } }, label)
        ),
        h("span", { style: { fontSize: 22, fontWeight: 300, color: "#fff" } },
          value, h("span", { style: { fontSize: 13, color: "#444", marginLeft: 4 } }, unit)
        )
      ),
      h("div", { style: { display: "flex", alignItems: "center", gap: 16 } },
        h("input", {
          type: "range", min: min, max: max, step: step || 1, value: value,
          onChange: function(e) { set(Number(e.target.value)); },
          style: { flex: 1 }
        }),
        h("input", {
          type: "number", min: min, max: max, step: step || 1, value: value,
          onChange: function(e) { var v = Number(e.target.value); if (v >= min && v <= max) set(v); },
          style: numInputStyle
        })
      )
    );
  };

  return h("div", { style: { display: "flex", flexDirection: "column", height: "100vh", minHeight: 600, background: "#000", color: "#fff", fontFamily: "'Inter', system-ui, sans-serif" } },

    /* Header */
    h("div", { style: { display: "flex", alignItems: "center", padding: "0 32px", height: 52, borderBottom: "1px solid #111", flexShrink: 0 } },
      h("a", { href: "/", style: { display: "flex", alignItems: "center", gap: 10, textDecoration: "none" } },
        h(Icon, { name: "server", size: 16, color: "#fff" }),
        h("span", { style: { fontSize: 14, fontWeight: 600, color: "#fff", letterSpacing: "-0.01em" } }, "Proxmox Console"),
        h("span", { style: { fontSize: 11, color: "#333", marginLeft: 2 } }, "v1.0")
      ),
      h("div", { style: { marginLeft: "auto" } },
        h("button", { "aria-label": "Logout", style: { background: "none", border: "none", cursor: "pointer", padding: 0, display: "flex", alignItems: "center", gap: 6, color: "#444", fontSize: 12 } },
          h(Icon, { name: "logOut", size: 14, color: "#444" }), "Logout"
        )
      )
    ),

    /* Main */
    h("div", { style: { flex: 1, overflowY: "auto", padding: "32px 40px", display: "flex", flexDirection: "column", gap: 0 } },

      /* Breadcrumb */
      h("div", { style: { display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#333", marginBottom: 24 } },
        h("a", { href: "/", style: { color: "#444", textDecoration: "none" } }, "Dashboard"),
        h("span", null, "/"),
        h("span", { style: { color: "#fff" } }, "リソース選択")
      ),

      /* Title */
      h("div", { style: { fontSize: 22, fontWeight: 300, color: "#fff", letterSpacing: "-0.02em", marginBottom: 28 } }, "仮想マシン リソース選択"),

      /* Sliders */
      h("form", {
        method: "get", action: "/info.html",
        style: { display: "flex", flexDirection: "column", gap: 0 }
      },
        h("input", { type: "hidden", name: "cpu", value: cpu }),
        h("input", { type: "hidden", name: "memory", value: mem }),
        h("input", { type: "hidden", name: "hdd", value: hdd }),

        sliderRow("CPU コア数", "cpu", cpu, setCpu, 1, 3, 1, "コア"),
        sliderRow("メモリ", "memoryStick", mem, setMem, 512, 4096, 512, "MB"),
        sliderRow("ディスク容量", "hardDrive", hdd, setHdd, 1, 64, 1, "GB"),

        /* Summary */
        h("div", { style: { padding: "18px 32px", border: "1px solid #111", marginTop: 24, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 16 } },
          h("div", { style: { display: "flex", gap: 28 } },
            [["CPU", cpu + " コア"], ["メモリ", mem + " MB"], ["ディスク", hdd + " GB"]].map(function(s) {
              return h("div", { key: s[0] },
                h("div", { style: { fontSize: 11, color: "#333", marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.07em" } }, s[0]),
                h("div", { style: { fontSize: 14, color: "#888" } }, s[1])
              );
            })
          ),
          h("button", {
            type: "submit",
            style: { background: "#fff", color: "#000", border: "none", borderRadius: 4, padding: "10px 28px", fontSize: 13, fontWeight: 500, cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }
          }, "次へ進む", h(Icon, { name: "arrowRight", size: 14, color: "#000" }))
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));

</script>
</body>
</html>
