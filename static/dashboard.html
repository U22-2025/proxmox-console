function Icon(props) {
  return h("svg", {
    width: props.size || 16, height: props.size || 16, viewBox: "0 0 24 24",
    fill: "none", stroke: props.color || "#fff", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round",
    style: Object.assign({ flexShrink: 0 }, props.style || {}),
  }, h("path", { d: iconPaths[props.name] }));
}

var statusConfig = {
  running: { dot: "#22c55e", color: "#22c55e" },
  done:    { dot: "#22c55e", color: "#22c55e" },
  stopped: { dot: "#f43f5e", color: "#f43f5e" },
  error:   { dot: "#f43f5e", color: "#f43f5e" },
  "running(init)":   { dot: "#f59e0b", color: "#f59e0b" },
  "running(apply)":  { dot: "#f59e0b", color: "#f59e0b" },
};

function Badge(status) {
  var s = statusConfig[status] || { dot: "#555", color: "#555" };
  return h("span", { style: { display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12, color: s.color } },
    h("span", { style: { width: 7, height: 7, borderRadius: "50%", background: s.dot, flexShrink: 0 } }),
    status
  );
}

function Bar(value, max) {
  var pct = max === 0 ? 0 : Math.min(100, Math.round((value / max) * 100));
  var col = pct > 85 ? "#f43f5e" : pct > 65 ? "#f59e0b" : "#fff";
  return h("div", { style: { display: "flex", alignItems: "center", gap: 10 } },
    h("div", { style: { flex: 1, height: 3, background: "#1e1e1e", borderRadius: 2 } },
      h("div", { style: { width: pct + "%", height: "100%", background: col, borderRadius: 2 } })
    ),
    h("span", { style: { fontSize: 11, color: "#555", minWidth: 28, textAlign: "right" } }, pct + "%")
  );
}

var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;

function StatCard(iconName, label, used, total, unit) {
  var pct = total === 0 ? 0 : Math.round((used / total) * 100);
  return h("div", { style: { flex: 1, minWidth: 140, padding: "20px 24px", border: "1px solid #111" } },
    h("div", { style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 16 } },
      h(Icon, { name: iconName, size: 14, color: "#444" }),
      h("span", { style: { fontSize: 11, color: "#444", textTransform: "uppercase", letterSpacing: "0.08em" } }, label)
    ),
    h("div", { style: { fontSize: 28, fontWeight: 300, color: "#fff", marginBottom: 12, lineHeight: 1 } },
      pct, h("span", { style: { fontSize: 14, color: "#444" } }, "%")
    ),
    Bar(used, total),
    h("div", { style: { marginTop: 8, fontSize: 11, color: "#333" } }, used + " / " + total + " " + unit)
  );
}

function TreeItem(iconName, label, depth, children, defaultOpen, isActive, onClick) {
  var _c = useState(!!defaultOpen); var open = _c[0]; var setOpen = _c[1];
  var _d = useState(false); var hover = _d[0]; var setHover = _d[1];
  var has = !!(children && children.length);
  return h("div", null,
    h("div", {

      onMouseEnter: function() { setHover(true); },
      onMouseLeave: function() { setHover(false); },
      style: {
        display: "flex", alignItems: "center", gap: 7,
        padding: "6px 16px 6px " + (16 + (depth || 0) * 16) + "px",
        cursor: "pointer", fontSize: 13,
        color: isActive ? "#fff" : hover ? "#aaa" : "#555",
        background: isActive ? "#111" : "transparent",
        borderLeft: "2px solid " + (isActive ? "#fff" : "transparent"),
        userSelect: "none",

      h(Icon, { name: iconName, size: 13 }),
      h("span", { style: { overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, label)
    ),
    open && children
  );
}

function App() {
  var _j = useState([]); var jobs = _j[0]; var setJobs = _j[1];

        setJobs(data || []);

    fetchJobs();
    var iv = setInterval(fetchJobs, 5000);
    return function() { clearInterval(iv); };

        h("button", { "aria-label": "Logout", onClick: function() { window.location.href = "/logout"; }, style: { background: "none", border: "none", cursor: "pointer", padding: 0 } }, h(Icon, { name: "logOut", size: 15, color: "#333" }))
      )

        TreeItem("plus", "新規作成", 0, null, false, false, function() { window.location.href = "/resource.html"; }),
        h("div", { style: { padding: "16px 18px 4px", fontSize: 10, color: "#2a2a2a", textTransform: "uppercase", letterSpacing: "0.1em" } }, "Manage"),
        TreeItem("folder", "Backups"),
        TreeItem("shield", "Firewall"),
        TreeItem("settings", "Configuration")
      ),

      /* Main */
      h("div", { style: { flex: 1, overflowY: "auto", padding: "32px 36px", display: "flex", flexDirection: "column", gap: 32 } },

              h(Icon, { name: "plus", size: 12 }), " VM作成"
            ),
            h("button", { "aria-label": "Refresh", onClick: function() { window.location.reload(); }, style: { background: "transparent", border: "1px solid #1a1a1a", borderRadius: 4, padding: "6px 14px", color: "#444", fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 } },
              h(Icon, { name: "refresh", size: 12 }), " Refresh"

        /* Meta info */
        h("div", { style: { display: "flex", gap: 32, flexWrap: "wrap", padding: "0 2px" } },
          [["VM稼働数", running + " 台"], ["エラー", errored + " 件"], ["処理中", pending + " 件"], ["合計", jobs.length + " 件"]].map(function(m) {
            return h("div", { key: m[0] },
              h("div", { style: { fontSize: 11, color: "#333", marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.07em" } }, m[0]),

          jobs.length === 0

                      h("td", { style: Object.assign({}, td, { color: "#333" }) }, formatTime(job.id))
                    );
                  }))

              )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));

</script>
