<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxmox Console — Dashboard</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Inter',system-ui,sans-serif}
</style>
</head>
<body>
<div id="root"></div>
<script>

var iconPaths = {
  server: "M5 4H4a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h1m6 0h2a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2M5 14H4a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h1m6 0h2a2 2 0 0 0 2-2v-2a2 2 0 0 0-2-2h-2",
  monitor: "M9 5H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-4M8 21h8m-4-4v4",
  hardDrive: "M22 12H2M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11zM6 16h.01M10 16h.01",
  cpu: "M4 5a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1z M9 9h6v6H9z M9 1v2M15 1v2M9 21v2M15 21v2M1 9h2M1 15h2M21 9h2M21 15h2",
  memoryStick: "M6 19v-1a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1m0 0v-1a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1m0 0v-1a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1M3 10h18M3 5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z",
  layers: "m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83zM2 12l8.58 3.91a2 2 0 0 0 1.66 0L22 12M2 17l8.58 3.91a2 2 0 0 0 1.66 0L22 17",
  refresh: "M1 4v6h6M23 20v-6h-6M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15",
  plus: "M12 5v14M5 12h14",
  logOut: "M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9",
  package: "M16.5 9.4 7.55 4.24M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16zM3.27 6.96 12 12.01l8.73-5.05M12 22.08V12",
};

function Icon(props) {
  return h("svg", {
    width: props.size || 16, height: props.size || 16, viewBox: "0 0 24 24",
    fill: "none", stroke: props.color || "#fff", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round",
    style: Object.assign({ flexShrink: 0 }, props.style || {}),
  }, h("path", { d: iconPaths[props.name] }));
}

var statusConfig = {
  done:    { dot: "#22c55e", color: "#22c55e" },
  running: { dot: "#22c55e", color: "#22c55e" },
  stopped: { dot: "#f43f5e", color: "#f43f5e" },
  error:   { dot: "#f43f5e", color: "#f43f5e" },
  "running(init)":  { dot: "#f59e0b", color: "#f59e0b" },
  "running(apply)": { dot: "#f59e0b", color: "#f59e0b" },
};

function Badge(status) {
  var s = statusConfig[status] || { dot: "#555", color: "#555" };
  return h("span", { style: { display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12, color: s.color } },
    h("span", { style: { width: 7, height: 7, borderRadius: "50%", background: s.dot, flexShrink: 0 } }),
    status
  );
}

function Bar(value, max) {
  var pct = max === 0 ? 0 : Math.min(100, Math.round((value / max) * 100));
  var col = pct > 85 ? "#f43f5e" : pct > 65 ? "#f59e0b" : "#fff";
  return h("div", { style: { display: "flex", alignItems: "center", gap: 10 } },
    h("div", { style: { flex: 1, height: 3, background: "#1e1e1e", borderRadius: 2 } },
      h("div", { style: { width: pct + "%", height: "100%", background: col, borderRadius: 2 } })
    ),
    h("span", { style: { fontSize: 11, color: "#555", minWidth: 28, textAlign: "right" } }, pct + "%")
  );
}

function StatCard(iconName, label, used, total, unit) {
  var pct = total === 0 ? 0 : Math.round((used / total) * 100);
  return h("div", { style: { flex: 1, minWidth: 140, padding: "20px 24px", border: "1px solid #111" } },
    h("div", { style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 16 } },
      h(Icon, { name: iconName, size: 14, color: "#444" }),
      h("span", { style: { fontSize: 11, color: "#444", textTransform: "uppercase", letterSpacing: "0.08em" } }, label)
    ),
    h("div", { style: { fontSize: 28, fontWeight: 300, color: "#fff", marginBottom: 12, lineHeight: 1 } },
      pct, h("span", { style: { fontSize: 14, color: "#444" } }, "%")
    ),
    Bar(used, total),
    h("div", { style: { marginTop: 8, fontSize: 11, color: "#333" } }, used + " / " + total + " " + unit)
  );
}

var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;

function App() {
  var _j = useState([]); var jobs = _j[0]; var setJobs = _j[1];
  var _v = useState([]); var vms = _v[0]; var setVMs = _v[1];
  var _h = useState(null); var hovered = _h[0]; var setHovered = _h[1];

  useEffect(function() {
    function fetchJobs() {
      fetch("/api/jobs").then(function(r) { return r.json(); }).then(function(data) {
        setJobs(data || []);
      }).catch(function() {});
    }
    function fetchVMs() {
      fetch("/api/vms", { credentials: "include" })
        .then(function(r){ return r.json(); })
        .then(function(data){
          setVMs(data || []);
        }).catch(function(){});
    }

    fetchVMs();
    var iv2 = setInterval(fetchVMs, 7000);
    fetchJobs();
    var iv = setInterval(fetchJobs, 5000);
    return function() {
      clearInterval(iv);
      clearInterval(iv2);
    };
  }, []);

  var running = jobs.filter(function(j) { return j.status === "done"; }).length;
  var errored = jobs.filter(function(j) { return j.status === "error"; }).length;
  var pending = jobs.filter(function(j) { return j.status !== "done" && j.status !== "error"; }).length;

  var th = { padding: "10px 16px", fontSize: 11, color: "#333", fontWeight: 500, textAlign: "left", borderBottom: "1px solid #111", textTransform: "uppercase", letterSpacing: "0.07em", whiteSpace: "nowrap" };
  var td = { padding: "14px 16px", fontSize: 13, color: "#ccc", borderBottom: "1px solid #0d0d0d", whiteSpace: "nowrap" };

  function formatTime(ts) {
    if (!ts) return "—";
    var d = new Date(parseInt(ts));
    return d.toLocaleDateString("ja-JP") + " " + d.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
  }

  return h("div", { style: { display: "flex", flexDirection: "column", height: "100vh", minHeight: 600, background: "#000", color: "#fff", fontFamily: "'Inter', system-ui, sans-serif" } },

    /* Header */
    h("div", { style: { display: "flex", alignItems: "center", padding: "0 32px", height: 52, borderBottom: "1px solid #111", flexShrink: 0 } },
      h("div", { style: { display: "flex", alignItems: "center", gap: 10 } },
        h(Icon, { name: "server", size: 16, color: "#fff" }),
        h("span", { style: { fontSize: 14, fontWeight: 600, color: "#fff", letterSpacing: "-0.01em" } }, "Proxmox Console"),
        h("span", { style: { fontSize: 11, color: "#333", marginLeft: 2 } }, "v1.0")
      ),
      h("div", { style: { marginLeft: "auto" } },
        h("button", { "aria-label": "Logout", onClick: function() {
          window.location.href = "/logout";
        }, style: { background: "none", border: "none", cursor: "pointer", padding: 0, display: "flex", alignItems: "center", gap: 6, color: "#444", fontSize: 12 } },
          h(Icon, { name: "logOut", size: 14, color: "#444" }), "Logout"
        )
      )
    ),

    /* Body */
    h("div", { style: { display: "flex", flex: 1, overflow: "hidden" } },
            /* Sidebar */
      h("div", {
        style: {
          width: 210,
          minWidth: 210,
          borderRight: "1px solid #111",
          overflowY: "auto",
          flexShrink: 0,
          paddingTop: 8,
          paddingBottom: 8
        }
      },
        h("div", {
          style: {
            padding: "8px 18px 4px",
            fontSize: 10,
            color: "#2a2a2a",
            textTransform: "uppercase",
            letterSpacing: "0.1em"
          }
        }, "Virtual Machines"),

        vms.length === 0
          ? h("div",
              { style: { padding: "6px 16px", fontSize: 12, color: "#333" } },
              "なし"
            )
          : vms.map(function(vm) {
              var isHover = hovered === "vm-" + vm.VMID;

              return h("div", {
                  key: vm.VMID,
                  onClick: function() {
                    window.location.href = "/vm.html?vmid=" + vm.VMID;
                  },
                  onMouseEnter: function() { setHovered("vm-" + vm.VMID); },
                  onMouseLeave: function() { setHovered(null); },
                  style: {
                    display: "flex",
                    alignItems: "center",
                    gap: 8,
                    padding: "6px 16px",
                    cursor: "pointer",
                    fontSize: 13,
                    color: isHover ? "#aaa" : "#555",
                    userSelect: "none"
                  }
                },
                h(Icon, {
                  name: "monitor",
                  size: 13,
                  color: isHover ? "#555" : "#333"
                }),
                h("span", {
                  style: {
                    overflow: "hidden",
                    textOverflow: "ellipsis",
                    whiteSpace: "nowrap"
                  }
                }, vm.Name)
              );
            })
      ),

      /* Main */
      h("div", { style: { flex: 1, overflowY: "auto", padding: "32px 40px", display: "flex", flexDirection: "column", gap: 32 } },

      /* Title row */
      h("div", { style: { display: "flex", alignItems: "flex-start", justifyContent: "space-between" } },
        h("div", null,
          h("div", { style: { display: "flex", alignItems: "center", gap: 12, marginBottom: 6 } },
            h("span", { style: { fontSize: 22, fontWeight: 300, color: "#fff", letterSpacing: "-0.02em" } }, "Dashboard"),
            Badge(running > 0 ? "running" : "stopped")
          ),
          h("div", { style: { fontSize: 12, color: "#333" } }, "Proxmox VE · Virtual Environment")
        ),
        h("button", {
          onClick: function() { window.location.href = "/resource.html"; },
          style: { background: "#fff", color: "#000", border: "none", borderRadius: 4, padding: "8px 18px", fontSize: 12, fontWeight: 500, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }
        },
          h(Icon, { name: "plus", size: 13, color: "#000" }), "VM作成"
        )
      ),

      /* Stat cards */
      h("div", { style: { display: "flex", gap: 0, border: "1px solid #111", flexWrap: "wrap" } },
        StatCard("cpu", "CPU", 23, 100, "%"),
        StatCard("memoryStick", "Memory", 10.4, 31.4, "GiB"),
        StatCard("hardDrive", "Disk", 18, 100, "GiB"),
        StatCard("layers", "Swap", 0.2, 8, "GiB")
      ),

      /* Meta info */
      h("div", { style: { display: "flex", gap: 32, flexWrap: "wrap" } },
        [["VM稼働数", running + " 台"], ["エラー", errored + " 件"], ["処理中", pending + " 件"], ["合計", jobs.length + " 件"]].map(function(m) {
          return h("div", { key: m[0] },
            h("div", { style: { fontSize: 11, color: "#333", marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.07em" } }, m[0]),
            h("div", { style: { fontSize: 13, color: "#888" } }, m[1])
          );
        })
      ),

      /* Divider */
      h("div", { style: { borderTop: "1px solid #111" } }),

      /* Table */
      h("div", null,
        h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 } },
          h("span", { style: { fontSize: 13, color: "#555" } }, "作成済みマシン一覧"),
          h("button", { "aria-label": "Refresh", onClick: function() { window.location.reload(); }, style: { background: "transparent", border: "1px solid #111", borderRadius: 4, padding: "5px 12px", color: "#444", fontSize: 11, cursor: "pointer", display: "flex", alignItems: "center", gap: 5 } },
            h(Icon, { name: "refresh", size: 11 }), " Refresh"
          )
        ),
        vms.length === 0
          ? h("div", { style: { padding: "48px 0", textAlign: "center", border: "1px solid #111" } },
              h("div", { style: { fontSize: 13, color: "#333", marginBottom: 16 } }, "作成済みのマシンはありません")
            )
          : h("div", { style: { overflowX: "auto" } },
              h("table", { style: { width: "100%", borderCollapse: "collapse" } },
                h("thead", null,
                  h("tr", null, ["VMID", "名前", "IP", "CPU", "Memory"].map(function(hdr) {
                    return h("th", { key: hdr, style: th }, hdr);
                  }))
                ),
                h("tbody", null, vms.map(function(vm) {
                  return h("tr", { key: vm.VMID },
                    h("td", { style: Object.assign({}, td, { color: "#2a2a2a" }) }, vm.VMID),
                    h("td", { style: Object.assign({}, td, { color: "#fff" }) },
                      h("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
                        h(Icon, { name: "monitor", size: 13, color: "#333" }),
                        vm.Name
                      )
                    ),
                    h("td", { style: Object.assign({}, td, { fontFamily: "monospace", fontSize: 12 }) }, vm.IP || "—"),
                    h("td", { style: td }, vm.Cores),
                    h("td", { style: td }, vm.Memory + " MB")
                  );
                }))
              )
            )
      )
    ) /* end main div */
    ) /* end body flex */
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));

</script>
</body>
</html>
