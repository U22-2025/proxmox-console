function Icon(props) {
  return h("svg", {
    width: props.size || 16, height: props.size || 16, viewBox: "0 0 24 24",
    fill: "none", stroke: props.color || "#fff", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round",
    style: Object.assign({ flexShrink: 0 }, props.style || {}),
  }, h("path", { d: iconPaths[props.name] }));
}

var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;

function TreeItem(iconName, label, depth, children, defaultOpen, isActive, onClick) {
  var _c = useState(!!defaultOpen); var open = _c[0]; var setOpen = _c[1];
  var _d = useState(false); var hover = _d[0]; var setHover = _d[1];
  var has = !!(children && children.length);
  return h("div", null,
    h("div", {
      onClick: function() { if (has) setOpen(!open); if (onClick) onClick(); },
      onMouseEnter: function() { setHover(true); },
      onMouseLeave: function() { setHover(false); },
      style: {
        display: "flex", alignItems: "center", gap: 7,
        padding: "6px 16px 6px " + (16 + (depth || 0) * 16) + "px",
        cursor: "pointer", fontSize: 13,
        color: isActive ? "#fff" : hover ? "#aaa" : "#555",
        background: isActive ? "#111" : "transparent",
        borderLeft: "2px solid " + (isActive ? "#fff" : "transparent"),
        userSelect: "none",
      }
    },
      has
        ? h(Icon, { name: open ? "chevronDown" : "chevronRight", size: 11, color: "#333" })
        : h("span", { style: { width: 11, flexShrink: 0 } }),
      h(Icon, { name: iconName, size: 13 }),
      h("span", { style: { overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, label)
    ),
    open && children
  );
}

var ansiColors = {
  30: "#555", 31: "#f87171", 32: "#5dcaa5", 33: "#eab308",
  34: "#7db8f0", 35: "#c084fc", 36: "#67e8f9", 37: "#e2e2e2",
  90: "#555", 91: "#f87171", 92: "#5dcaa5", 93: "#eab308",
  94: "#7db8f0", 95: "#c084fc", 96: "#67e8f9", 97: "#e2e2e2",
};

function ansiToHtml(str) {
  var esc = str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  var out = "", i = 0, open = false;
  while (i < esc.length) {
    if (esc[i] === "\x1b" && esc[i + 1] === "[") {
      var j = esc.indexOf("m", i + 2);
      if (j === -1) { out += esc[i]; i++; continue; }
      var codes = esc.slice(i + 2, j).split(";").map(Number);
      if (open) { out += "</span>"; open = false; }
      var style = "";
      for (var k = 0; k < codes.length; k++) {
        var c = codes[k];
        if (c === 0) { style = ""; open = false; }
        else if (c === 1) style += "font-weight:700;";
        else if (c === 4) style += "text-decoration:underline;";
        else if (ansiColors[c]) style += "color:" + ansiColors[c] + ";";
      }
      if (style) { out += '<span style="' + style + '">'; open = true; }
      i = j + 1;
    } else {
      out += esc[i]; i++;
    }
  }
  if (open) out += "</span>";
  return out;
}

function App() {
  var id = new URLSearchParams(window.location.search).get("id");

  var _s = useState("—"); var status = _s[0]; var setStatus = _s[1];
  var _ip = useState("—"); var ip = _ip[0]; var setIp = _ip[1];
  var _log = useState(""); var log = _log[0]; var setLog = _log[1];
  var _done = useState(false); var done = _done[0]; var setDone = _done[1];
  var logRef = useRef(null);

  useEffect(function() {
    if (!id) return;
    var iv = setInterval(function() {
      fetch("/status?id=" + id).then(function(r) { return r.json(); }).then(function(data) {
        setStatus(data.status || "—");
        setIp(data.ip || "—");
        setLog(data.log || "");

        if (data.status === "done" || data.status === "error") {
          setDone(true);
          if (data.status === "done") clearInterval(iv);
        }
      }).catch(function() {});
    }, 2000);
    return function() { clearInterval(iv); };
  }, [id]);

  useEffect(function() {
    if (logRef.current) {
      var el = logRef.current;
      var isBottom = el.scrollHeight - el.scrollTop <= el.clientHeight + 8;
      if (isBottom) el.scrollTop = el.scrollHeight;

  }, [log]);

  var statusColor = status === "done" ? "#22c55e" : status === "error" ? "#f43f5e" : "#f59e0b";

        h("span", { style: { fontSize: 14, fontWeight: 600, color: "#fff", letterSpacing: "-0.01em" } }, "Proxmox Console"),

      ),
      h("div", { style: { flex: 1, maxWidth: 320, position: "relative" } },

      ),
      h("div", { style: { marginLeft: "auto", display: "flex", alignItems: "center", gap: 20 } },
        h("button", { "aria-label": "Notifications", style: { background: "none", border: "none", cursor: "pointer", padding: 0 } }, h(Icon, { name: "bell", size: 15, color: "#333" })),

      )
    ),

    /* Body */
    h("div", { style: { display: "flex", flex: 1, overflow: "hidden" } },

      /* Sidebar */
      h("div", { style: { width: 210, minWidth: 210, borderRight: "1px solid #111", overflowY: "auto", flexShrink: 0, paddingTop: 8 } },
        h("div", { style: { padding: "8px 18px 4px", fontSize: 10, color: "#2a2a2a", textTransform: "uppercase", letterSpacing: "0.1em" } }, "Resources"),
        TreeItem("shield", "Datacenter", 0, [
          TreeItem("server", "pve-node1", 1, [
            TreeItem("hardDrive", "Storage", 2, [
              TreeItem("database", "local (LVM)", 3),

            TreeItem("network", "Network", 2),
          ], true),
        ], true),
        h("div", { style: { padding: "16px 18px 4px", fontSize: 10, color: "#2a2a2a", textTransform: "uppercase", letterSpacing: "0.1em" } }, "Actions"),
        TreeItem("plus", "新規作成", 0, null, false, false, function() { window.location.href = "/resource.html"; }),
        h("div", { style: { padding: "16px 18px 4px", fontSize: 10, color: "#2a2a2a", textTransform: "uppercase", letterSpacing: "0.1em" } }, "Manage"),
        TreeItem("folder", "Backups"),
        TreeItem("shield", "Firewall"),
        TreeItem("settings", "Configuration")

      /* Main */
      h("div", { style: { flex: 1, overflowY: "auto", padding: "32px 36px", display: "flex", flexDirection: "column", gap: 24 } },

        /* Title */

            status

        /* Divider */
        h("div", { style: { borderTop: "1px solid #111" } }),

        /* Info cards */
