<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VM作成 — ステータス</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Inter',system-ui,sans-serif}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div id="root"></div>
<script>

var iconPaths = {
  server: "M5 4H4a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h1m6 0h2a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2M5 14H4a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h1m6 0h2a2 2 0 0 0 2-2v-2a2 2 0 0 0-2-2h-2",
  logOut: "M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9",
};

function Icon(props) {
  return h("svg", {
    width: props.size || 16, height: props.size || 16, viewBox: "0 0 24 24",
    fill: "none", stroke: props.color || "#fff", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round",
    style: Object.assign({ flexShrink: 0 }, props.style || {}),
  }, h("path", { d: iconPaths[props.name] }));
}

var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;

var ansiColors = {
  30: "#555", 31: "#f87171", 32: "#5dcaa5", 33: "#eab308",
  34: "#7db8f0", 35: "#c084fc", 36: "#67e8f9", 37: "#e2e2e2",
  90: "#555", 91: "#f87171", 92: "#5dcaa5", 93: "#eab308",
  94: "#7db8f0", 95: "#c084fc", 96: "#67e8f9", 97: "#e2e2e2",
};

function ansiToHtml(str) {
  var esc = str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  var out = "", i = 0, open = false;
  while (i < esc.length) {
    if (esc[i] === "\x1b" && esc[i + 1] === "[") {
      var j = esc.indexOf("m", i + 2);
      if (j === -1) { out += esc[i]; i++; continue; }
      var codes = esc.slice(i + 2, j).split(";").map(Number);
      if (open) { out += "</span>"; open = false; }
      var style = "";
      for (var k = 0; k < codes.length; k++) {
        var c = codes[k];
        if (c === 0) { style = ""; open = false; }
        else if (c === 1) style += "font-weight:700;";
        else if (c === 4) style += "text-decoration:underline;";
        else if (ansiColors[c]) style += "color:" + ansiColors[c] + ";";
      }
      if (style) { out += '<span style="' + style + '">'; open = true; }
      i = j + 1;
    } else {
      out += esc[i]; i++;
    }
  }
  if (open) out += "</span>";
  return out;
}

function App() {
  var id = new URLSearchParams(window.location.search).get("id");

  var _s = useState("—"); var status = _s[0]; var setStatus = _s[1];
  var _ip = useState("—"); var ip = _ip[0]; var setIp = _ip[1];
  var _log = useState(""); var log = _log[0]; var setLog = _log[1];
  var _done = useState(false); var done = _done[0]; var setDone = _done[1];
  var logRef = useRef(null);

  useEffect(function() {
    if (!id) return;
    var iv = setInterval(function() {
      fetch("/status?id=" + id).then(function(r) { return r.json(); }).then(function(data) {
        setStatus(data.status || "—");
        setIp(data.ip || "—");
        setLog(data.log || "");
        if (data.status === "done" || data.status === "error") {
          setDone(true);
          if (data.status === "done") clearInterval(iv);
        }
      }).catch(function() {});
    }, 2000);
    return function() { clearInterval(iv); };
  }, [id]);

  useEffect(function() {
    if (logRef.current) {
      var el = logRef.current;
      var isBottom = el.scrollHeight - el.scrollTop <= el.clientHeight + 8;
      if (isBottom) el.scrollTop = el.scrollHeight;
    }
  }, [log]);

  var statusColor = status === "done" ? "#22c55e" : status === "error" ? "#f43f5e" : "#f59e0b";
  var dotAnimation = done ? "none" : "pulse 1.5s infinite";
  var dotBg = status === "done" ? "#22c55e" : status === "error" ? "#f43f5e" : "#f59e0b";

  return h("div", { style: { display: "flex", flexDirection: "column", height: "100vh", minHeight: 600, background: "#000", color: "#fff", fontFamily: "'Inter', system-ui, sans-serif" } },

    /* Header */
    h("div", { style: { display: "flex", alignItems: "center", padding: "0 32px", height: 52, borderBottom: "1px solid #111", flexShrink: 0 } },
      h("a", { href: "/", style: { display: "flex", alignItems: "center", gap: 10, textDecoration: "none" } },
        h(Icon, { name: "server", size: 16, color: "#fff" }),
        h("span", { style: { fontSize: 14, fontWeight: 600, color: "#fff", letterSpacing: "-0.01em" } }, "Proxmox Console"),
        h("span", { style: { fontSize: 11, color: "#333", marginLeft: 2 } }, "v1.0")
      ),
      h("div", { style: { marginLeft: "auto" } },
        h("button", { "aria-label": "Logout", style: { background: "none", border: "none", cursor: "pointer", padding: 0, display: "flex", alignItems: "center", gap: 6, color: "#444", fontSize: 12 } },
          h(Icon, { name: "logOut", size: 14, color: "#444" }), "Logout"
        )
      )
    ),

    /* Main */
    h("div", { style: { flex: 1, overflowY: "auto", padding: "32px 40px", display: "flex", flexDirection: "column", gap: 24 } },

      /* Breadcrumb */
      h("div", { style: { display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#333" } },
        h("a", { href: "/", style: { color: "#444", textDecoration: "none" } }, "Dashboard"),
        h("span", null, "/"),
        h("span", { style: { color: "#fff" } }, "仮想マシン作成")
      ),

      /* Title + status */
      h("div", { style: { display: "flex", alignItems: "center", gap: 12 } },
        h("span", { style: { fontSize: 22, fontWeight: 300, color: "#fff", letterSpacing: "-0.02em" } }, "仮想マシン作成"),
        h("span", { style: { display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12, color: statusColor } },
          h("span", { style: { width: 7, height: 7, borderRadius: "50%", background: dotBg, flexShrink: 0, animation: dotAnimation } }),
          status
        )
      ),

      /* Info cards */
      h("div", { style: { display: "flex", gap: 10 } },
        h("div", { style: { flex: 1, padding: "18px 24px", border: "1px solid #111" } },
          h("div", { style: { fontSize: 11, color: "#333", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.07em" } }, "ステータス"),
          h("div", { style: { fontSize: 15, color: statusColor, fontWeight: 500 } }, status)
        ),
        h("div", { style: { flex: 1, padding: "18px 24px", border: "1px solid #111" } },
          h("div", { style: { fontSize: 11, color: "#333", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.07em" } }, "IP アドレス"),
          h("div", { style: { fontSize: 14, color: ip !== "—" ? "#7db8f0" : "#333", fontFamily: "monospace" } }, ip)
        )
      ),

      /* Log */
      h("div", { style: { display: "flex", flexDirection: "column", gap: 10, flex: 1, minHeight: 0 } },
        h("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
          h("span", { style: { fontSize: 11, color: "#444", textTransform: "uppercase", letterSpacing: "0.07em" } }, "ログ"),
          h("span", { style: { width: 7, height: 7, borderRadius: "50%", background: dotBg, animation: dotAnimation, display: "inline-block" } })
        ),
        h("div", {
          ref: logRef,
          style: {
            flex: 1, minHeight: 300,
            background: "#0a0a0a", border: "1px solid #111", borderRadius: 4,
            padding: "16px 20px", overflowY: "auto",
            fontFamily: "monospace", fontSize: 12, lineHeight: 1.7,
            color: "#aaa", whiteSpace: "pre-wrap", wordBreak: "break-all",
          },
          dangerouslySetInnerHTML: { __html: ansiToHtml(log) }
        })
      ),

      /* Back */
      done ? h("div", null,
        h("a", {
          href: "/",
          style: { textDecoration: "none", background: "transparent", border: "1px solid #111", borderRadius: 4, padding: "10px 20px", fontSize: 13, color: "#444", cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 6 }
        }, "ダッシュボードに戻る")
      ) : null
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));

</script>
</body>
</html>
