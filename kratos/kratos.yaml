dsn: memory

serve:
  public:
    base_url: http://kratos:4433
  admin:
    base_url: http://kratos:4434

selfservice:
  default_browser_return_url: http://your-app:8080

  methods:
    password:
      enabled: true

  flows:
    login:
      ui_url: http://kratos-ui:3000/login
    registration:
      ui_url: http://kratos-ui:3000/registration

identity:
  schemas:
    - id: default
      url: file:///etc/config/identity.schema.json